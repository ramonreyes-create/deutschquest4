<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeutschQuest 4 - Sprint 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head><body>
<header><h1>🇩🇪 DeutschQuest Story Engine</h1><button id="theme">🌙</button></header>
<div class="wrap">
<section class="left">
<h2>Reisekarte</h2>
<svg viewBox="0 0 320 520" class="map">
<path d="M150 40 L170 110 L145 180 L180 250 L140 330 L165 410 L150 480" class="route"/>
<circle class="city unlocked" cx="150" cy="40" r="12" data-city="Berlin"/>
<circle class="city" cx="170" cy="110" r="12" data-city="Leipzig"/>
<circle class="city" cx="145" cy="180" r="12" data-city="Nürnberg"/>
<circle class="city" cx="180" cy="250" r="12" data-city="München"/>
<circle class="train" id="train" cx="150" cy="40" r="7"/>
</svg>
</section>
<section class="right">
<div class="card">
<h2 id="city">Berlin</h2>
<p id="desc">Erste Mission freigeschaltet.</p>
<button id="travel">🚆 Reise starten</button>
</div>
<div class="card">
<h3>QuestPass</h3>
<ul id="pass"><li>✓ Berlin</li></ul>
</div>
</section>
</div>
<script src="assets/js/app.js"></script>
</body></html>
